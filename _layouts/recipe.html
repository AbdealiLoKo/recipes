---
layout: default
---
<div class="recipe-page container" itemscope itemtype="http://schema.org/Recipe">

  <div class="recipe-page__backdrop"></div>

  <div class="recipe-page__hero image-container xs-p2">
    <img
      itemprop="image"
      src="{{ page.url | replace:'.html','.jpg' | prepend: site.baseurl }}"
      alt="{{ page.title }}"
      onerror="this.onerror=null;this.src='{{ '/assets/placeholder-food.png' | prepend: site.baseurl }}';this.closest('.recipe-page__hero').setAttribute('data-image-missing','true');"
    />
    <p class="recipe-page__missing">No image available</p>
  </div>

  <article class="post-content recipe-page__content px2">

    <header class="post-header">
      <p class="recipe-page__eyebrow center">Recipe</p>
      <h1 class="post-title center m1 sm-mt3" itemprop="name">{{ page.title }}</h1>
    </header>

    <div class="recipe-page__body px2 mt3 clearfix">
      <div class="sm-col-8 mx-auto" itemprop="description">{{page.content}}</div>
    </div>

    {% if page.categories %}
      <div class="recipe-page__categories clearfix">
        {% for category in page.categories %}
          <p class="recipe-page__category">Category: <span itemprop="recipeCategory">{{ category }}</span></p>
        {% endfor %}
      </div>
    {% endif %}

  </article>

</div>

<script type="text/javascript">

  $( document ).ready(function() {

  jQuery.fn.clickToggle = function(a,b) {
  var ab=[b,a];
  function cb(){ ab[this._tog^=1].call(this); }
  return this.on("click", cb);
  };

  $("ul li").append('<input type="checkbox">');
  $("ul li").clickToggle(function(){
    $(this).children("input").prop('checked', true);
    $(this).addClass("is-checked");
    var height = $(this).height();
    var y = $(window).scrollTop();
    $('html, body').animate({scrollTop: y+height+16}, 200);
  }, function(){
    $(this).children("input").prop('checked', false);
    $(this).removeClass("is-checked");
    var height = $(this).height();
    var y = $(window).scrollTop();
    $('html, body').animate({scrollTop: y-height-16}, 200);
  });

  });

</script>
