---
layout: default
---

<div class="home">
  <section class="hero-banner">
    <div class="hero-banner__inner">
      <p class="hero-banner__eyebrow">Kitchen notebook</p>
      <h1 class="hero-banner__title">{{ site.title }}</h1>
      <p class="hero-banner__copy">{{ site.description }}</p>
    </div>
  </section>

  <div class="recipes xs-px1 xs-mt2">
    <div class="clearfix">
      {% assign sorted = site.recipes | sort:"date" %}
      {% for post in sorted %}

        <div class="sm-col sm-col-6 md-col-6 lg-col-4 xs-px1 xs-mb2">
            <a class="recipe-card block relative" href="{{ post.url | prepend: site.baseurl }}">
              <div class="recipe-card__image image ratio bg-cover" style="background-image: url({{ post.url | replace:'.html','.jpg' | prepend: site.baseurl }});"></div>
              <div class="recipe-card__body absolute">
                <p class="recipe-card__label">Recipe</p>
                <h2 class="title recipe-card__title m0">{{ post.title }}</h2>
              </div>
            </a>
        </div>
      {% endfor %}
    </div>
  </div>
</div>
